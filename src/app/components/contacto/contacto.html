<main>
  <h1>Contacto</h1>
  <form (ngSubmit)="enviarFormulario()" #miForm="ngForm">
    <div class="form-group">
      <input type="text" [(ngModel)]="nombre" name="nombre" required placeholder="Tu nombre" />
    </div>
    <div class="form-group">
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        required
        placeholder="ejemplo@correo.com"
      />
    </div>
    <button type="submit" [disabled]="!miForm.valid" class="mt-2">Enviar Datos</button>
  </form>

  <!-- <pre>{{ { nombre: nombre(), email: email() } | json }}</pre> -->
</main>
