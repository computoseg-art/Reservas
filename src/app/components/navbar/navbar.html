<nav
  class="navbar navbar-expand-lg navbar-dark fixed-top transition-all"
  [ngClass]="{ 'navbar-scrolled': isScrolled, 'bg-transparent': !isScrolled }"
>
  <div class="container">
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center menu-items">
        <li class="nav-item d-flex align-items-center">
          <a class="nav-link" routerLink="/home" routerLinkActive="active-link">Inicio</a>
        </li>

        @if (authService.userSignal()) {
          <li class="nav-item d-flex align-items-center">
            <a class="nav-link" routerLink="/agenda" routerLinkActive="active-link">📅 Mi Agenda</a>
          </li>
        }

        <li class="nav-item d-flex align-items-center">
          <a class="nav-link" routerLink="/contacto" routerLinkActive="active-link">Contacto</a>
        </li>

        <li class="nav-item ms-lg-4 d-flex align-items-center">
          @if (!authService.userSignal()) {
            <a class="btn-cta text-decoration-none" routerLink="/login"> Ingresar </a>
          } @else {
            <div class="user-pill d-flex align-items-center gap-3">
              <span class="user-name d-none d-md-inline mb-0">
                {{ authService.usuarioLogueado() }}
                @if (authService.esAdmin()) {
                  <span class="badge-admin">Admin</span>
                }
              </span>
              <button class="btn-logout" (click)="onLogout()">Salir</button>
            </div>
          }
        </li>
      </ul>
    </div>
  </div>
</nav>
